version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: rentfinder-db
    restart: always
    environment:
      MYSQL_DATABASE: rentfinder
      MYSQL_ROOT_PASSWORD: password
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .
    container_name: rentfinder-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=rentfinder
      - DB_USER=root
      - DB_PASSWORD=root@tarun
    depends_on:
      - db

volumes:
  db_data:
